<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AEVOR</title>

  <style>
    /* Load custom font */
    @font-face {
      font-family: 'font';
      src: url('font.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f7;
      font-family: 'font', sans-serif;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(#e0e0e0 1px, transparent 1px),
                        linear-gradient(90deg, #e0e0e0 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
    }

    /* Soft gradient overlay */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.05), transparent 70%);
    }

    h1 {
      font-size: 7rem;
      letter-spacing: 12px;
      color: #111;
      z-index: 1;
      font-family: 'font', sans-serif;
    }
  </style>
</head>
<body>

  <h1>Aevor</h1>

</body>
</html>
